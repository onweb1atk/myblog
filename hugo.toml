baseURL = 'https://onweb1atk.github.io/myblog/'
title = "1atk's personal blog"
theme = "hugo-theme-stack"
languageCode = "zh-cn"

[params]
    mainSections = ["posts"]
    sidebar = { avatar = "profile.jpg", title = "1atk", subtitle = "学点什么，想点什么，写点什么。\n\ncongwithsilent@gmail.com" }
    
    # 社交链接 (Stack 风格)
    [[params.social]]
        name = "GitHub"
        icon = "github"
        url = "https://github.com/onweb1atk"
    [[params.social]]
        name = "Email"
        icon = "mail"
        url = "mailto:congwithsilent@gmail.com"

    # 文章页配置
    [params.article]
        math = false
        toc = true
        readingTime = true

    # 颜色模式
    [params.colorScheme]
        toggle = true
        default = "auto"

[menu]
    [[menu.main]]
        identifier = "home"
        name = "首页"
        url = "/"
        weight = 10
        pre = "home"
    [[menu.main]]
        identifier = "archives"
        name = "归档"
        url = "/archives"
        weight = 20
        pre = "archive"
    [[menu.main]]
        identifier = "search"
        name = "搜索"
        url = "/search"
        weight = 30
        pre = "search"

[outputs]
    home = ["HTML", "RSS", "JSON"]
