baseURL = 'https://onweb1atk.github.io/myblog/'
title = 'My Blog'
theme = 'PaperMod'
languageCode = 'zh-cn'

[params]
    defaultTheme = "auto"
    showReadingTime = true
    displayFullContent = false
    ShowShareButtons = true
    ShowCodeCopyButtons = true
    
    # Profile Mode Configuration
    [params.profileMode]
        enabled = true
        title = "1atk's personal blog"
        subtitle = "学点什么，想点什么，写点什么。"
        imageUrl = "profile.jpg"
        imageTitle = "1atk"
        imageWidth = 120
        imageHeight = 120
        
        [[params.profileMode.buttons]]
            name = "文章"
            url = "posts"
        
        [[params.profileMode.socialIcons]]
            name = "email"
            url = "mailto:congwithsilent@gmail.com"

[menu]
    [[menu.main]]
        identifier = "posts"
        name = "文章"
        url = "/posts"
        weight = 10
    [[menu.main]]
        identifier = "tags"
        name = "标签"
        url = "/tags"
        weight = 20
    [[menu.main]]
        identifier = "archives"
        name = "归档"
        url = "/archives"
        weight = 30
