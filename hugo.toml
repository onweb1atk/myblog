baseURL = 'https://onweb1atk.github.io/myblog/'
title = "1atk's personal blog"
theme = "blowfish"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"

[params]
    colorScheme = "blowfish" # 默认配色方案
    defaultAppearance = "auto" # 自动跟随系统暗色
    autoSwitchAppearance = true # 允许用户手动切换
    
    # 首页配置
    [params.homepage]
        showRecent = true # 在首页显示最近文章
        showRecentItems = 3 # 显示 3 篇
        layout = "background" # 现代感背景布局
        homepageImage = "profile.jpg" # 背景图
        
    # 个人资料
    [params.author]
        name = "1atk"
        image = "profile.jpg"
        headline = "学点什么，想点什么，写点什么。"
        bio = "在互联网的角落，记录一些不被算法定义的思考。\n\ncongwithsilent@gmail.com"
        links = [
            { email = "mailto:congwithsilent@gmail.com" },
            { github = "https://github.com/onweb1atk" }
        ]

    # 文章页配置
    [params.article]
        showTableOfContents = true
        showReadingTime = true
        showWordCount = true
        showTaxonomies = true # 显示标签和分类

[menu]
    [[menu.main]]
        identifier = "posts"
        name = "文章"
        url = "/posts"
        weight = 10
    [[menu.main]]
        identifier = "tags"
        name = "标签"
        url = "/tags"
        weight = 20
    [[menu.main]]
        identifier = "archives"
        name = "归档"
        url = "/archives"
        weight = 30

[outputs]
    home = ["HTML", "RSS", "JSON"]
