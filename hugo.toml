baseURL = 'https://onweb1atk.github.io/myblog/'
title = "1atk's personal blog"
theme = 'PaperMod'
languageCode = 'zh-cn'

[params]
    defaultTheme = "auto"
    showReadingTime = true
    displayFullContent = false
    ShowShareButtons = true
    ShowCodeCopyButtons = true
    
    # 首页 Profile Mode 配置
    [params.profileMode]
        enabled = true
        title = "1atk's personal blog"
        subtitle = "学点什么，想点什么，写点什么。<br/>在互联网的角落，记录一些不被算法定义的思考。<br/><br/>📬 联系我：congwithsilent@gmail.com"
        imageUrl = "profile.jpg"
        imageTitle = "1atk"
        imageWidth = 120
        imageHeight = 120
        
        [[params.profileMode.buttons]]
            name = "📚 全部文章"
            url = "posts"
        [[params.profileMode.buttons]]
            name = "🏷️ 标签分类"
            url = "tags"
        [[params.profileMode.buttons]]
            name = "⌛ 时间轴"
            url = "archives"

    # 社交图标配置
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/onweb1atk"

[menu]
    [[menu.main]]
        identifier = "posts"
        name = "文章"
        url = "/posts"
        weight = 10
    [[menu.main]]
        identifier = "tags"
        name = "标签"
        url = "/tags"
        weight = 20
    [[menu.main]]
        identifier = "archives"
        name = "归档"
        url = "/archives"
        weight = 30
    [[menu.main]]
        identifier = "search"
        name = "搜索"
        url = "/search"
        weight = 40

# 开启搜索索引
[outputs]
    home = ["HTML", "RSS", "JSON"]
