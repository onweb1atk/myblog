# Build and deploy a Hugo site to a VPS over SSH
name: Deploy Hugo site to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
      VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR }}
      VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
      POST_DEPLOY_CMD: ${{ secrets.VPS_POST_DEPLOY_CMD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build with Hugo
        run: |
          hugo \
            --cleanDestinationDir \
            --gc \
            --minify

      - name: Validate deploy settings
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_TARGET_DIR"
          test -n "$VPS_HOST_KEY"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS host key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_HOST_KEY" >> ~/.ssh/known_hosts

      - name: Verify SSH and VPS target
        run: |
          ssh \
            -p "${VPS_SSH_PORT:-22}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "${VPS_USER}@${VPS_HOST}" \
            "set -eu; whoami; command -v rsync; mkdir -p '${VPS_TARGET_DIR}'; ls -ld '${VPS_TARGET_DIR}'"

      - name: Sync files to VPS
        run: |
          rsync -azvv --delete --timeout=30 \
            -e "ssh -p ${VPS_SSH_PORT:-22} -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=3" \
            ./public/ "${VPS_USER}@${VPS_HOST}:${VPS_TARGET_DIR}/"

      - name: Run post-deploy command
        if: ${{ env.POST_DEPLOY_CMD != '' }}
        run: |
          ssh \
            -p "${VPS_SSH_PORT:-22}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "${VPS_USER}@${VPS_HOST}" \
            "$POST_DEPLOY_CMD"
